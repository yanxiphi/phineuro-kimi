name: Intel-Company Linker

on:
  schedule:
    - cron: '30 */2 * * *'  # 每2小时运行一次（在爬虫之后30分钟）
  workflow_dispatch:

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Intel-Company Link API
        run: |
          curl -X POST \
            "https://phineuro.life/api/cron/link-intel-to-companies" \
            -H "Authorization: Bearer ${{ secrets.News_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            --retry 3 --retry-delay 5 --connect-timeout 15 --max-time 60 \
            -v || echo "Request failed with exit code $?"
      - name: Log completion
        run: echo "Intel-company link triggered at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
