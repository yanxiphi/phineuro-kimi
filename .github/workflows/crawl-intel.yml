name: Intel Crawler (Phase 1)

on:
  schedule:
    # 每2小时运行一次 (UTC)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Intel Fetch API
        run: |
          curl -X POST \
            "https://phineuro.life/api/cron/fetch-intel" \
            -H "Authorization: Bearer ${{ secrets.News_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            --retry 3 --retry-delay 5 --connect-timeout 15 --max-time 60 \
            -v || echo "Request failed with exit code $?"
      - name: Log completion
        run: echo "Intel crawl triggered at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
