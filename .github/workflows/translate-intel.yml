name: Intel Translator (KIMI API)

on:
  schedule:
    # 每小时运行一次（比爬虫频率低，给翻译留出时间）
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Intel Translation API
        run: |
          curl -X POST \
            "https://phineuro.life/api/cron/translate-intel" \
            -H "Authorization: Bearer ${{ secrets.News_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            --retry 3 --retry-delay 5 --connect-timeout 15 --max-time 60 \
            -v || echo "Request failed with exit code $?"
      - name: Log completion
        run: echo "Intel translation triggered at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
